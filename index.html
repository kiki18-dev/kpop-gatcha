<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BufDay Photocard</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body {
  min-height:100vh;
  background-image: url('Background.jpg');
  background-repeat: no-repeat;
  background-position: center;
  background-size: cover;
  display:flex; 
  flex-direction:column; 
  align-items:center; 
  justify-content:flex-start;
  font-family:'Georgia',serif; overflow-x:hidden; overflow-y:auto; position:relative;
  padding:20px 0;
}
.balloon {
  position:absolute; border-radius:50%; opacity:0.35;
  animation:floatUp linear infinite;
}
@keyframes floatUp {
  0%{transform:translateY(110vh) scale(1);}
  100%{transform:translateY(-20vh) scale(1.05);}
}
.star {
  position:absolute; color:#fff; opacity:0.7;
  animation:twinkle 2s ease-in-out infinite alternate;
}
@keyframes twinkle {
  from{opacity:0.3;transform:scale(0.9);}
  to{opacity:0.9;transform:scale(1.1);}
}
.container {
  position:relative; z-index:10;
  display:flex; flex-direction:column; align-items:center;
  gap:40px; padding:40px 20px; width:100%; max-width:380px; min-height:calc(100vh-40px); justify-content:center;
}
.header { text-align:center; }
.subtitle { font-size:12px; letter-spacing:3px; color:#ffd4d4; text-transform:uppercase; margin-bottom:4px; }
.logo {
  font-size:58px; font-style:italic; font-weight:900; line-height:1;
  background:linear-gradient(180deg,#ffffff 0%,#c8c8c8 40%,#a0a0a0 60%,#e8e8e8 100%);
  -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text;
  filter:drop-shadow(0 2px 4px rgba(0,0,0,0.4));
}
.card-wrap {
  position:relative; 
  width:70vw; 
  max-width: 260px;
  aspect-ratio: 5.5 / 8.5;
  height:auto;
}
.holo-border {
  position:absolute; inset:0;
  border-radius:22px;
  background:linear-gradient(135deg,#ff9de2,#a78bfa,#67e8f9,#86efac,#fde68a,#fca5a5,#ff9de2);
  background-size:300% 300%;
  animation:holo 4s ease infinite;
  box-shadow:0 0 24px rgba(255,255,255,0.25),0 8px 32px rgba(0,0,0,0.4);
  padding:4px;
}
@keyframes holo {
  0%{background-position:0% 50%;}50%{background-position:100% 50%;}100%{background-position:0% 50%;}
}
.card-scene {
  width:100%; height:100%; perspective:900px;
}
.stack-wrapper {
  position: relative;
  width: 70vw; 
  max-width: 260px;
  aspect-ratio: 5.5 / 8.5; /* Matches standard photocard ratio */
  /* The shadow here is softer and bigger to cover the entire stack */
  filter: drop-shadow(0 15px 40px rgba(0,0,0,0.4));
  margin: 0 auto; /* Centers the stack horizontally */
  margin-bottom:40px;
  margin-top:-30px;
}
.stack-layer {
  position: absolute;
  inset: 0;
  border-radius: 22px; /* Matches your holo border */
  border: 1px solid rgba(255,255,255,0.15); /* Adds a faint edge */
  background-size: cover;
  background-position: center;
}
.layer-bottom {
  /* Rotates counter-clockwise and offsets slightly to the left */
  transform: rotate(-7deg) translate(-10px, -5px);
  z-index: 1; /* Lowest stacking order */
  /* Reusing your gradient or an image—you can pick */
  background: linear-gradient(135deg, #fce68a, #86efac, #fca5a5); 
  opacity: 0.6; /* Softens the bottom layer */
}
.layer-middle {
  /* Rotates counter-clockwise (less than bottom) and offsets slightly */
  transform: rotate(-3deg) translate(-5px, -2px);
  z-index: 2; /* Middle stacking order */
  /* A slightly different gradient for realism */
  background: linear-gradient(135deg, #a78bfa, #67e8f9); 
  opacity: 0.8;
}
.card-wrap {
  position: relative;
  width: 100%; /* Spans the full parent width */
  height: 100%;
  z-index: 10; /* Highest stacking order, sits above background layers */
  /* Remove the shadow from here because it's now controlled by stack-wrapper */
  box-shadow: none; 
}
.card-inner 
{
  width:100%; height:100%; position:relative;
  transform-style:preserve-3d;
  transition:transform 0.75s cubic-bezier(0.4,0.2,0.2,1);
}
.card-inner.flipped { transform:rotateY(180deg); }
.card-face {
  position:absolute; width:100%; height:100%;
  border-radius:16px; backface-visibility:hidden; -webkit-backface-visibility:hidden;
  overflow:hidden;
}
.card-face-back { transform:rotateY(180deg); }
.placeholder {
  width:100%; height:100%; display:flex; flex-direction:column;
  align-items:center; justify-content:center; gap:10px;
  color:rgba(255,255,255,0.55); font-size:13px; letter-spacing:1px;
  position:relative;
}
.card-number-badge {
  position:absolute; top:10px; right:10px;
  background:rgba(255,255,255,0.15); border-radius:20px;
  padding:3px 10px; font-size:11px; color:rgba(255,255,255,0.7);
  letter-spacing:1px;
}
.card-label {
  position:absolute; bottom:10px; left:0; right:0;
  text-align:center; font-size:11px; letter-spacing:2px;
  color:rgba(255,255,255,0.5); text-transform:uppercase;
}

.buttons { display:flex; flex-direction:column; gap:16px; width:240px; margin-top:20px; }
.btn {
  width:100%; padding:14px; border-radius:40px; border:none;
  font-size:14px; font-weight:700; letter-spacing:2px; text-transform:uppercase;
  cursor:pointer; transition:transform 0.15s, box-shadow 0.15s;
}
.btn:active { transform:scale(0.97); }
.btn-draw {
  background:linear-gradient(180deg,#f0f0f0 0%,#d0d0d0 100%);
  color:#222; box-shadow:0 4px 16px rgba(0,0,0,0.3),inset 0 1px 0 rgba(255,255,255,0.9);
}
.btn-download {
  background:linear-gradient(180deg,#e0e0e0 0%,#b8b8b8 100%);
  color:#333; box-shadow:0 4px 16px rgba(0,0,0,0.25),inset 0 1px 0 rgba(255,255,255,0.8);
  display:flex; align-items:center; justify-content:center; gap:8px;
}
.btn-draw:disabled { opacity:0.6; cursor:not-allowed; }

/* card bg gradients */
.bg-0{background:linear-gradient(160deg,#2a1a3e,#1a0a2e);}
.bg-1{background:linear-gradient(160deg,#1a2a1e,#0a1a0e);}
.bg-2{background:linear-gradient(160deg,#2a1a1a,#1a0a0a);}
.bg-3{background:linear-gradient(160deg,#1a1a2a,#0a0a1a);}
.bg-4{background:linear-gradient(160deg,#2a2a1a,#1a1a0a);}
.bg-5{background:linear-gradient(160deg,#1a2a2a,#0a1a1a);}
.bg-6{background:linear-gradient(160deg,#2a1a2a,#1a0a1a);}
.bg-7{background:linear-gradient(160deg,#1a1e2a,#0a0e1a);}
.bg-8{background:linear-gradient(160deg,#2a1e1a,#1a0e0a);}
.bg-9{background:linear-gradient(160deg,#1e2a1a,#0e1a0a);}
.bg-10{background:linear-gradient(160deg,#2a2a2a,#101010);}
.bg-11{background:linear-gradient(160deg,#1a1a3e,#0a0a2e);}
</style>
</head>
<body>

<script>
  const starPos=[[8,15],[88,10],[5,55],[92,45],[15,80],[85,75],[50,5],[30,90],[70,88]];
  starPos.forEach(([l,t],i)=>{
    const s=document.createElement('div'); s.className='star';
    s.innerHTML=i%2===0?'&#10022;':'&#9733;';
    s.style.cssText=`left:${l}%;top:${t}%;animation-delay:${i*0.3}s;font-size:${14+i%3*6}px;`;
    document.body.appendChild(s);
  });
</script>

<div class="container">
  <div class="header">
    <div class="subtitle">— Kim Cxxx Wxx —</div>
    <img src="Text.png" alt="BufDay" style="width:220px;"/>
  </div>

  <div class="stack-wrapper">
    <div class="stack-layer layer-bottom"></div>
    <div class="stack-layer layer-middle"></div>
    <div class="card-wrap">
    <div class="holo-border">
      <div class="card-scene">
        <div class="card-inner" id="cardInner">
          <div class="card-face card-face-front" id="frontFace">
            <div class="placeholder bg-0" id="frontContent">
              <svg width="44" height="44" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2" opacity="0.4">
                <rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="M21 15l-5-5L5 21"/>
              </svg>
              <span>Card #1</span>
              <div class="card-label">★ BufDay Edition ★</div>
            </div>
          </div>
          <div class="card-face card-face-back" id="backFace">
            <div class="placeholder bg-1" id="backContent">
              <svg width="44" height="44" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2" opacity="0.4">
                <rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="M21 15l-5-5L5 21"/>
              </svg>
              <span>Card #2</span>
              <div class="card-label">★ BufDay Edition ★</div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div class="draw-counter" id="drawCounter"></div>

  <div class="buttons">
    <button class="btn btn-draw" id="drawBtn" onclick="drawCard()">Draw Card</button>
    <button class="btn btn-download" onclick="handleDownload()">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
        <path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/>
      </svg>
      Download
    </button>
  </div>
</div>

<script>
  const TOTAL = 12;
  const photoCards = Array.from({length:TOTAL},(_,i)=>({
    id: i+1,
    label: `Card #${i+1}`,
    bg: `bg-${i}`
  }));

  let flipped = false;
  let drawCount = 1;
  let currentFront = 0;
  let currentBack = 1;
  let animating = false;

  const cardInner = document.getElementById('cardInner');
  const drawBtn = document.getElementById('drawBtn');
  const drawCounter = document.getElementById('drawCounter');

  function randomIndex(exclude) {
    let idx;
    do { idx = Math.floor(Math.random() * TOTAL); } while(idx === exclude);
    return idx;
  }

  function renderCard(el, cardIdx) {
    const card = photoCards[cardIdx];
    el.innerHTML = `
      <div class="placeholder ${card.bg}">
        <svg width="44" height="44" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2" opacity="0.4">
          <rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="M21 15l-5-5L5 21"/>
        </svg>
        <span>${card.label}</span>
        <div class="card-label">★ BufDay Edition ★</div>
      </div>`;
  }

  function drawCard() {
    if(animating) return;
    animating = true;
    drawBtn.disabled = true;
    ;

    if(!flipped) {
      // about to show back face — pick new back card
      currentBack = randomIndex(currentFront);
      renderCard(document.getElementById('backFace'), currentBack);
      cardInner.classList.add('flipped');
      flipped = true;
    } else {
      // about to show front face — pick new front card
      currentFront = randomIndex(currentBack);
      renderCard(document.getElementById('frontFace'), currentFront);
      cardInner.classList.remove('flipped');
      flipped = false;
    }

    setTimeout(() => {
      animating = false;
      drawBtn.disabled = false;
    }, 800);
  }

  function handleDownload() {
    alert('Provide your image URLs and I\'ll enable real photo downloads!');
  }
</script>
</body>
</html>
